name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install VQLab + GUI extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[gui]"

      - name: Self-check (python -m qsim)
        run: python -m qsim

      - name: Validation suite (pytest)
        run: pytest -q --tb=short
