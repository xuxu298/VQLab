# Configured QKD LINK (DeviceSpec): Phase-1 metro, InGaAs self-differencing detector.
# `configure()` turns these high-level knobs into the full Alice->fiber->Bob picture:
# behavioural sim (QBER/SKR), whole-link BOM + cost, derived board params, design rules.
name: qkd_metro_ingaas
protocol: decoy_bb84
# --- Alice (transmitter) ---
source: gainswitched_dfb
encoder: amzi_timebin
qrng: quantis
modulator_er_db: 30.0       # intensity-modulator extinction ratio (security-critical, >30 dB)
source_jitter_ps: 20.0
# --- channel ---
distance_km: 25.0
fiber_alpha_db_km: 0.2
# --- Bob (receiver) ---
detector: ingaas_sd
n_channels: 2
gate_rate_hz: 1.25e9
bob_insertion_db: 3.5
amzi_visibility: 0.98       # Bob AMZI visibility -> e_amzi = (1-V)/2 = 1%
n_z_block: 1.0e8
notes: "Phase-1 reference: matches docs/03 (H1) — QBER ~1%, ~8 Mbps @25 km, ~$57k/link."
