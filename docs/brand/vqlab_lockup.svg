<svg viewBox="0 0 360 96" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="VQLab — Bàn lượng tử ảo">
  <defs>
    <linearGradient id="lkGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <radialGradient id="lkTile" cx="30%" cy="22%" r="95%">
      <stop offset="0" stop-color="#13203a"/>
      <stop offset="1" stop-color="#0a1020"/>
    </radialGradient>
    <filter id="lkGlow" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="2.0" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- mark -->
  <g transform="translate(8,16)">
    <rect x="1.2" y="1.2" width="61.6" height="61.6" rx="16" fill="url(#lkTile)"
          stroke="url(#lkGrad)" stroke-width="1.4" stroke-opacity="0.65"/>
    <g fill="none" stroke="url(#lkGrad)" stroke-width="6.4" stroke-linecap="round" filter="url(#lkGlow)">
      <path d="M17 17 L32 46"/><path d="M47 17 L32 46"/>
    </g>
    <circle cx="17" cy="17" r="3.1" fill="#34dcea"/>
    <circle cx="47" cy="17" r="3.1" fill="#b06cf2"/>
    <circle cx="32" cy="46" r="5.3" fill="url(#lkGrad)" filter="url(#lkGlow)"/>
    <circle cx="32" cy="46" r="2.1" fill="#ecffff"/>
  </g>
  <!-- wordmark -->
  <text x="86" y="50" font-family="'Plus Jakarta Sans','DejaVu Sans',sans-serif" font-weight="800"
        font-size="40" letter-spacing="-1">
    <tspan fill="url(#lkGrad)">VQ</tspan><tspan fill="#eaf1fb">Lab</tspan>
  </text>
  <text x="87" y="74" font-family="'Inter','DejaVu Sans',sans-serif" font-weight="600"
        font-size="13.5" letter-spacing="2.5" fill="#8194b3">BÀN LƯỢNG TỬ ẢO</text>
</svg>
