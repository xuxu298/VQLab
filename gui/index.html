<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>qsim · virtual quantum bench</title>
<style>
  :root { --bg:#0f1720; --panel:#16212e; --ink:#e8eef4; --mut:#9fb0c0; --line:#2a3a4d;
          --accent:#2f9e9e; --ok:#27ae60; --warn:#e67e22; --fail:#c0392b; --info:#2980b9; }
  * { box-sizing:border-box; }
  body { margin:0; font:14px/1.5 system-ui,Segoe UI,Roboto,sans-serif; background:var(--bg); color:var(--ink); }
  header { padding:14px 22px; border-bottom:1px solid var(--line); display:flex; align-items:baseline; gap:12px; flex-wrap:wrap; }
  header h1 { font-size:18px; margin:0; }
  header span { color:var(--mut); font-size:12px; }
  header select { margin-left:auto; background:#0e1722; color:var(--ink); border:1px solid var(--accent);
                  border-radius:6px; padding:6px 10px; font-size:14px; }
  .wrap { display:grid; grid-template-columns:330px 1fr; gap:18px; padding:18px 22px; }
  .panel { background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:16px; }
  h2 { font-size:13px; text-transform:uppercase; letter-spacing:.05em; color:var(--mut); margin:0 0 12px; }
  label { display:block; margin:10px 0 4px; color:var(--mut); font-size:12px; }
  select, input[type=number] { width:100%; background:#0e1722; color:var(--ink);
       border:1px solid var(--line); border-radius:6px; padding:7px 8px; }
  input[type=range] { width:100%; }
  .rngval { float:right; color:var(--accent); font-variant-numeric:tabular-nums; }
  .badge { display:inline-block; padding:5px 12px; border-radius:999px; font-weight:600; font-size:13px; }
  .badge.ok { background:rgba(39,174,96,.18); color:#5fe0a0; border:1px solid #27ae60; }
  .badge.fail { background:rgba(192,57,43,.18); color:#ff8b7e; border:1px solid #c0392b; }
  .metrics { display:flex; gap:12px; margin:14px 0; flex-wrap:wrap; }
  .metric { flex:1; min-width:130px; background:#0e1722; border:1px solid var(--line); border-radius:8px; padding:10px 12px; }
  .metric .v { font-size:20px; font-weight:700; font-variant-numeric:tabular-nums; }
  .metric .k { color:var(--mut); font-size:11px; text-transform:uppercase; letter-spacing:.04em; }
  img#fig { width:100%; border-radius:8px; background:#fff; margin-top:8px; }
  .rule { padding:5px 10px; border-radius:6px; margin:4px 0; font-size:13px; }
  .rule.FAIL { background:rgba(192,57,43,.16); border-left:3px solid var(--fail); }
  .rule.WARN { background:rgba(230,126,34,.14); border-left:3px solid var(--warn); }
  .rule.INFO { background:rgba(41,128,185,.14); border-left:3px solid var(--info); }
  .rule.PASS { background:rgba(39,174,96,.14); border-left:3px solid var(--ok); }
  table { width:100%; border-collapse:collapse; font-size:12.5px; margin-top:6px; }
  th,td { text-align:left; padding:4px 8px; border-bottom:1px solid var(--line); }
  td.num { text-align:right; font-variant-numeric:tabular-nums; }
  .side { color:var(--accent); font-weight:600; padding-top:10px; }
  .sub td { color:var(--mut); }
  #busy { color:var(--accent); font-size:12px; min-height:16px; }
</style>
</head>
<body>
<header>
  <h1>qsim · virtual quantum bench</h1>
  <span>configure a quantum device — turn knobs, the simulation &amp; BOM update together</span>
  <select id="domain"></select>
</header>
<div class="wrap">
  <div class="panel">
    <h2>Device knobs</h2>
    <div id="knobs"></div>
    <div id="busy" style="margin-top:12px"></div>
  </div>
  <div class="panel">
    <h2>Configured device <span id="dlabel" style="color:var(--ink)"></span></h2>
    <div id="badge"></div>
    <div class="metrics" id="metrics"></div>
    <img id="fig" alt="domain figure"/>
    <h2 style="margin-top:18px">Design rules</h2>
    <div id="rules"></div>
    <h2 style="margin-top:18px">Bill of materials</h2>
    <table id="bom"><tbody></tbody></table>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
let schema = [], defaults = {}, timer = null;

function coerce(v){ const n = Number(v);
  return (v!=="" && !isNaN(n) && /^[0-9.eE+-]+$/.test(String(v))) ? n : v; }

async function init(){
  const doms = await (await fetch("/api/domains")).json();
  $("domain").innerHTML = doms.map(d=>`<option value="${d.name}">${d.label}</option>`).join("");
  $("domain").addEventListener("change", loadDomain);
  await loadDomain();
}

async function loadDomain(){
  const dom = $("domain").value;
  const s = await (await fetch("/api/schema/"+dom)).json();
  schema = s.schema; defaults = s.defaults; $("dlabel").textContent = "· "+s.label;
  $("knobs").innerHTML = schema.map(k=>knobHtml(k)).join("");
  schema.forEach(k=>{
    const el = $("k_"+k.key); el.addEventListener("input", onChange);
    if(k.type==="range") syncLabel(k);
  });
  run();
}

function knobHtml(k){
  const d = defaults[k.key];
  const u = k.unit ? ` <span class="rngval" id="v_${k.key}"></span>` : "";
  if(k.type==="select"){
    const opts = k.options.map(o=>`<option value="${o.key}" ${o.key==d?"selected":""}>${o.label}</option>`).join("");
    return `<label>${k.label}</label><select id="k_${k.key}">${opts}</select>`;
  }
  if(k.type==="range")
    return `<label>${k.label}${u}</label><input type="range" id="k_${k.key}" min="${k.min}" max="${k.max}" step="${k.step}" value="${d}"/>`;
  return `<label>${k.label}</label><input type="number" id="k_${k.key}" min="${k.min}" max="${k.max}" step="${k.step}" value="${d}"/>`;
}

function syncLabel(k){ const el=$("v_"+k.key); if(el) el.textContent = (+$("k_"+k.key).value)+ (k.unit?(" "+k.unit):""); }
function onChange(e){ schema.forEach(k=>{ if(k.type==="range") syncLabel(k); });
  clearTimeout(timer); timer=setTimeout(run, 220); }

function collect(){ const knobs={}; schema.forEach(k=>{ knobs[k.key]=coerce($("k_"+k.key).value); }); return knobs; }

async function run(){
  $("busy").textContent="computing…";
  const r = await (await fetch("/api/configure",{method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({domain:$("domain").value, knobs:collect()})})).json();
  $("busy").textContent="";
  if(r.error){ $("badge").innerHTML=`<span class="badge fail">ERROR: ${r.error}</span>`; return; }
  render(r);
}

function render(r){
  $("badge").innerHTML = r.feasible
    ? '<span class="badge ok">✓ FEASIBLE</span>' : '<span class="badge fail">✗ NOT FEASIBLE</span>';
  $("metrics").innerHTML = r.metrics.map(m=>
    `<div class="metric"><div class="v">${m.display}</div><div class="k">${m.label}</div></div>`).join("");
  $("fig").src = "data:image/png;base64,"+r.figure_b64;
  $("rules").innerHTML = r.rules.map(x=>`<div class="rule ${x.level}"><b>${x.level}</b> · ${x.msg}</div>`).join("");
  let rows="";
  for(const side of Object.keys(r.cost_by_side)){
    const items = r.bom.filter(i=>i.side===side); if(!items.length) continue;
    rows += `<tr><td class="side" colspan="3">${side}</td></tr>`;
    for(const it of items)
      rows += `<tr><td>${it.ref} ×${it.qty}</td><td>${it.part}</td><td class="num">$${it.line_cost_usd.toLocaleString()}</td></tr>`;
    rows += `<tr class="sub"><td></td><td>${side} subtotal</td><td class="num">$${r.cost_by_side[side].toLocaleString()}</td></tr>`;
  }
  rows += `<tr><td></td><td><b>TOTAL</b></td><td class="num"><b>$${r.bom_total_usd.toLocaleString()}</b></td></tr>`;
  $("bom").querySelector("tbody").innerHTML = rows;
}
init();
</script>
</body>
</html>
