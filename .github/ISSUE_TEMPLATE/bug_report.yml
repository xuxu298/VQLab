name: Bug report
description: Something doesn't work the way the docs say it should
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please confirm the basics so we can reproduce.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you run and what did you see?
      placeholder: |
        I ran `python -m qsim gui` and the page at http://127.0.0.1:8000 returned a 500.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      description: What the docs / README led you to expect.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: How to reproduce
      description: Minimum commands to reproduce on a fresh clone.
      render: shell
      placeholder: |
        git clone https://github.com/xuxu298/VQLab
        cd VQLab && pip install -e ".[gui]"
        python -m qsim gui
    validations:
      required: true

  - type: input
    id: env
    attributes:
      label: Environment
      description: OS + Python version + (optional) ngspice/verilator/kicad versions if relevant.
      placeholder: "Ubuntu 22.04, Python 3.11.6"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / traceback
      description: Paste the relevant output. Strip anything you don't want public.
      render: shell
